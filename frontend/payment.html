<!DOCTYPE html>
<html>
<head>
  <title>Payment</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-page">

<div class="container">
  <h2>Choose Your Plan</h2>

  <div class="plan-container">

    <div class="plan">
      <h3>Weekly Plan</h3>
      <p>$10</p>
      <button onclick="pay('weekly')">Subscribe</button>
    </div>

    <div class="plan">
      <h3>Monthly Plan</h3>
      <p>$35</p>
      <button onclick="pay('monthly')">Subscribe</button>
    </div>

    <div class="plan">
      <h3>Yearly Plan</h3>
      <p>$420</p>
      <button onclick="pay('yearly')">Subscribe</button>
    </div>

  </div>

  <button class="back-btn" onclick="window.location='dashboard.html'">
    Back to Dashboard
  </button>
</div>

<script src="app.js"></script>
</body>
</html>
